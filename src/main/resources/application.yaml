server:
  port: 8080

spring:
  application:
    name: notes-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/notes_manager
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true